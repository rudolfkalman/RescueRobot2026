name: ROS 2 CI with GHCR

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/rudolfkalman/ros-dev:jazzy
  IMAGE_NAME: ghcr.io/rudolfkalman/rescuerobot2026

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Pull base image
        run: docker pull ${{ env.BASE_IMAGE }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: |
            type=gha

          cache-to: type=gha,mode=max

      - name: Test build inside container
        run: |
          IMAGE_TAG=$"${{ env.IMAGE_NAME }}:latest"

          docker run --rm \
            -v ${{ github.workspace }}:/ws \
            -w /ws \
            --user root \
            $IMAGE_TAG \
            /bin/bash -c "
              set -e

              source /opt/ros/jazzy/setup.sh

              colcon build --symlink-install \
                --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                --packages-ignore \$(ls src | grep '^ext_' || true)

              # 変更ファイルだけlint（高速化）
              for file in \$(git diff --name-only origin/develop...HEAD | grep '\.cpp' || true); do
                pkg=\$(echo \$file | cut -d/ -f2)
                clang-tidy \$file -p build/\$pkg --config-file=.clang-tidy || true
              done
            "
