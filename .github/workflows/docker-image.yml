name: ROS 2 Build and Push to GHCR

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rudolfkalman/rescuerobot2026

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix={{date 'YYYYMMDD-HHmm'}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # PRの時はビルドチェックのみ、マージ(push)時はGHCRに保存
          push: ${{ github.event_name != 'pull_request' }}
          # ★ビルドしたイメージをこのActions内で使えるようにロードする
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # コンテナの中で実際にビルドが通るかチェック + clang-tidy
      - name: Test Colcon Build
        run: |
          # tags の中から 1 つ目（フルネームのタグ）を取り出して使う
          # ここで ${{ steps.meta.outputs.version }} は使わず、フルタグを指定します
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          
          docker run --rm -v ${{ github.workspace }}:/ws -w /ws --user root $IMAGE_TAG /bin/bash -c "
            chown -R root:root /ws &&
            . /opt/ros/jazzy/setup.sh &&
            colcon build --symlink-install \
              --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              --packages-ignore \$(ls src | grep '^ext_') &&
            find src -name '*.cpp' | grep -v 'src/ext_' | while read file; do
              pkg=\$(echo \"\$file\" | cut -d/ -f2)
              clang-tidy \"\$file\" -p \"build/\$pkg\" --config-file=.clang-tidy
            done
          "